<!DOCTYPE html>
<html>
<head><style>body{margin:0;background:#f0f0f0;}</style></head>
<body>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { full_pos, full_idx, cut_pos, cut_col } from './geometry.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const frustum = 12;
const aspect = innerWidth / innerHeight;
const camera = new THREE.OrthographicCamera(
  -frustum*aspect/2, frustum*aspect/2, frustum/2, -frustum/2, 0.1, 1000
);
camera.position.set(8, 3, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const ctrl = new OrbitControls(camera, renderer.domElement);
ctrl.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const d1 = new THREE.DirectionalLight(0xffffff, 1.0); d1.position.set(3,5,4); scene.add(d1);
const d2 = new THREE.DirectionalLight(0xffffff, 0.5); d2.position.set(-3,3,2); scene.add(d2);
const pl = new THREE.PointLight(0xffffff, 1.5, 50); pl.position.set(6,4,8); scene.add(pl);

function buildIndexedMesh(positions, indices, material) {
  const indexed = new THREE.BufferGeometry();
  indexed.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  indexed.setIndex(new THREE.BufferAttribute(indices, 1));
  const geo = indexed.toNonIndexed();
  geo.computeVertexNormals();
  geo.rotateX(-Math.PI / 2);
  return new THREE.Mesh(geo, material);
}

// Full model on left — all red
const matRed = new THREE.MeshPhongMaterial({ color: 0xff3333, specular: 0xffffff, shininess: 80, side: THREE.DoubleSide });
const fullMesh = buildIndexedMesh(full_pos, full_idx, matRed);
fullMesh.position.x = -3;
scene.add(fullMesh);

// Cut model on right — vertex colors (red outer, grey inner)
const cutGeo = new THREE.BufferGeometry();
cutGeo.setAttribute('position', new THREE.BufferAttribute(cut_pos, 3));
cutGeo.setAttribute('color', new THREE.BufferAttribute(cut_col, 3));
cutGeo.computeVertexNormals();
cutGeo.rotateX(-Math.PI / 2);

const matVertexColor = new THREE.MeshPhongMaterial({
  vertexColors: true, specular: 0xffffff, shininess: 80, side: THREE.DoubleSide
});
const cutMesh = new THREE.Mesh(cutGeo, matVertexColor);
cutMesh.position.x = 3;
scene.add(cutMesh);

function animate(){requestAnimationFrame(animate);ctrl.update();renderer.render(scene,camera);}
animate();
window.addEventListener('resize',()=>{
  const a = innerWidth/innerHeight;
  camera.left=-frustum*a/2; camera.right=frustum*a/2;
  camera.top=frustum/2; camera.bottom=-frustum/2;
  camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
